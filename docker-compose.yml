version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - JWT_SECRET=${JWT_SECRET:-your-256-bit-secret-key-for-digital-therapy-app-replace-in-production}
      - SPRING_DATASOURCE_URL=jdbc:h2:file:/app/data/digitaltherapy_db;AUTO_SERVER=TRUE
    volumes:
      - app-data:/app/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    networks:
      - therapy-net

  frontend:
    build:
      context: ./mindbridge
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - therapy-net

volumes:
  app-data:

networks:
  therapy-net:
    driver: bridge
